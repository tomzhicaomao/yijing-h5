<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>易经占卜</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --primary: #1a1a2e;
      --accent: #c9a227;
      --accent-light: #e8c547;
      --bg-dark: #0f0f1a;
      --text: #ffffff;
      --text-secondary: rgba(255,255,255,0.6);
      --card-bg: rgba(255,255,255,0.08);
    }
    
    body {
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f0f1a 100%);
      min-height: 100vh;
      color: var(--text);
      -webkit-overflow-scrolling: touch;
    }
    
    .bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }
    
    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #fff;
      border-radius: 50%;
      animation: twinkle 3s infinite;
    }
    
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    
    .container {
      position: relative;
      z-index: 1;
      max-width: 420px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
      padding-bottom: 80px;
    }
    
    .header {
      text-align: center;
      padding: 30px 0 20px;
    }
    
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: float 3s ease-in-out infinite;
    }
    
    .taiji {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: linear-gradient(180deg, #c9a227 50%, #e8c547 50%);
      position: relative;
      box-shadow: 0 8px 30px rgba(201, 162, 39, 0.4);
    }
    
    .taiji::before {
      content: '';
      position: absolute;
      width: 60px;
      height: 30px;
      top: 5px;
      left: 5px;
      border-radius: 30px 30px 0 0;
      background: #e8c547;
    }
    
    .taiji::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      top: 22px;
      left: 25px;
      background: #1a1a2e;
      border-radius: 50%;
      border: 3px solid #c9a227;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    
    .title {
      font-size: 24px;
      font-weight: 300;
      letter-spacing: 6px;
      background: linear-gradient(90deg, var(--accent), var(--accent-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .subtitle {
      font-size: 11px;
      color: var(--text-secondary);
      letter-spacing: 3px;
      margin-top: 6px;
    }
    
    .intro-card {
      background: rgba(201, 162, 39, 0.1);
      border: 1px solid rgba(201, 162, 39, 0.2);
      border-radius: 12px;
      padding: 12px 14px;
      margin: 16px auto 0;
      max-width: 90%;
    }
    
    .intro-title {
      font-size: 13px;
      color: var(--accent);
      margin-bottom: 6px;
      font-weight: 500;
    }
    
    .intro-text {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.6;
      text-align: justify;
    }
    
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    
    .card:hover {
      border-color: rgba(201, 162, 39, 0.2);
    }
    
    .daily-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    
    .daily-title {
      font-size: 14px;
      color: var(--text-secondary);
    }
    
    .daily-title span { color: var(--accent); }
    
    .daily-btn {
      background: linear-gradient(135deg, var(--accent), #a88420);
      color: #fff;
      border: none;
      padding: 6px 16px;
      border-radius: 15px;
      font-size: 12px;
      cursor: pointer;
    }
    
    .daily-result {
      padding: 15px;
      background: rgba(201, 162, 39, 0.1);
      border-radius: 12px;
      margin-top: 12px;
      display: none;
    }
    
    .daily-result.show { display: block; }
    
    .daily-gua {
      font-size: 24px;
      color: var(--accent-light);
      margin-bottom: 4px;
    }
    
    .daily-brief {
      font-size: 13px;
      color: var(--text-secondary);
    }
    
    .section-title {
      font-size: 14px;
      text-align: center;
      margin-bottom: 16px;
      letter-spacing: 4px;
      color: var(--text-secondary);
    }
    
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    
    .input-item {
      flex: 1;
    }
    
    .input-item label {
      display: block;
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-align: center;
    }
    
    .input-item input {
      width: 100%;
      height: 48px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 18px;
      text-align: center;
      outline: none;
    }
    
    .input-item input:focus {
      border-color: var(--accent);
    }
    
    .btn-row {
      display: flex;
      gap: 10px;
    }
    
    .btn {
      flex: 1;
      height: 44px;
      border-radius: 22px;
      font-size: 14px;
      cursor: pointer;
      border: none;
      letter-spacing: 2px;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      color: #1a1a2e;
      font-weight: 600;
    }
    
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.15);
    }
    
    .result { display: none; }
    .result.show { display: block; }
    
    .result-header {
      text-align: center;
      margin-bottom: 20px;
    }
    
    .gua-name {
      font-size: 42px;
      color: var(--accent-light);
      text-shadow: 0 0 30px rgba(232, 197, 71, 0.4);
    }
    
    .gua-symbol {
      font-size: 28px;
      letter-spacing: 6px;
      margin-top: 8px;
      color: var(--text-secondary);
    }
    
    .section {
      margin-bottom: 14px;
      padding: 14px;
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
    }
    
    .section-label {
      font-size: 12px;
      color: var(--accent);
      margin-bottom: 8px;
    }
    
    .ancient { font-size: 15px; line-height: 1.6; }
    .modern { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
    
    .yao-list { display: flex; flex-direction: column; gap: 8px; }
    
    .yao-item {
      padding: 10px;
      background: rgba(0,0,0,0.15);
      border-radius: 8px;
      border-left: 3px solid rgba(201, 162, 39, 0.3);
    }
    
    .yao-item.active {
      border-left-color: var(--accent);
      background: rgba(201, 162, 39, 0.08);
    }
    
    .yao-pos {
      font-size: 11px;
      color: var(--accent);
    }
    
    .interp-item { margin-bottom: 12px; }
    .interp-item:last-child { margin-bottom: 0; }
    .interp-label { font-size: 12px; color: var(--accent); margin-bottom: 4px; }
    .interp-text { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
    
    .share-btn {
      width: 100%;
      height: 40px;
      background: linear-gradient(135deg, #4CAF50, #45a049);
      border: none;
      border-radius: 20px;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      margin-top: 12px;
    }
    
    .user-bar {
      text-align: center;
      margin-top: 16px;
    }
    
    .user-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      padding: 6px 20px;
      border-radius: 15px;
      font-size: 12px;
    }
    
    .user-name { color: var(--accent); margin-right: 8px; }
    
    .points-tag {
      font-size: 12px;
      color: #e8c547;
      background: rgba(232, 197, 71, 0.15);
      padding: 4px 10px;
      border-radius: 12px;
    }
    
    .recharge-btn {
      background: linear-gradient(135deg, #07c160, #06ad56);
      color: #fff;
      border: none;
      padding: 6px 14px;
      border-radius: 15px;
      font-size: 12px;
      cursor: pointer;
      margin-left: 8px;
    }
    
    .float-btn {
      position: fixed;
      bottom: 25px;
      right: 25px;
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      box-shadow: 0 6px 20px rgba(201, 162, 39, 0.4);
      cursor: pointer;
      z-index: 100;
    }
    
    .float-btn.show { display: flex; }
    
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(10px);
    }
    
    .modal.show { display: flex; }
    
    .modal-content {
      background: #1a1a2e;
      border-radius: 20px;
      width: 100%;
      max-width: 340px;
      max-height: 75vh;
      overflow-y: auto;
      border: 1px solid rgba(201, 162, 39, 0.2);
    }
    
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    
    .modal-header h3 {
      font-size: 16px;
      color: var(--accent);
    }
    
    .modal-close {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: var(--text-secondary);
      cursor: pointer;
    }
    
    .modal-body { padding: 20px; }
    
    .form-input {
      width: 100%;
      height: 42px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 0 14px;
      color: #fff;
      font-size: 14px;
      margin-bottom: 12px;
    }
    
    .form-input::placeholder { color: rgba(255,255,255,0.3); }
    
    .link-text {
      text-align: center;
      font-size: 13px;
      color: var(--text-secondary);
    }
    
    .link-text a { color: var(--accent); text-decoration: none; }
    
    .history-list { display: flex; flex-direction: column; gap: 10px; }
    
    .history-item {
      padding: 12px;
      background: rgba(0,0,0,0.2);
      border-radius: 10px;
      cursor: pointer;
      border-left: 3px solid transparent;
    }
    
    .history-item:hover {
      background: rgba(201, 162, 39, 0.1);
      border-left-color: var(--accent);
    }
    
    .history-date { font-size: 11px; color: var(--text-secondary); }
    .history-gua { font-size: 16px; color: var(--accent-light); margin-top: 2px; }
    
    .empty-text { text-align: center; color: var(--text-secondary); padding: 30px; font-size: 13px; }
    
    .recharge-balance {
      text-align: center;
      font-size: 16px;
      color: #e8c547;
      margin-bottom: 20px;
    }
    
    .recharge-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .recharge-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(7, 193, 96, 0.1);
      border: 1px solid rgba(7, 193, 96, 0.3);
      border-radius: 12px;
      padding: 14px 16px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .recharge-item:hover {
      background: rgba(7, 193, 96, 0.2);
      transform: scale(1.02);
    }
    
    .recharge-amount {
      font-size: 16px;
      color: #fff;
    }
    
    .recharge-price {
      font-size: 18px;
      color: #07c160;
      font-weight: 600;
    }
    
    .recharge-tip {
      text-align: center;
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="bg" id="bg"></div>

  <div class="container">
    <header class="header">
      <div class="logo">
        <div class="taiji"></div>
      </div>
      <h1 class="title">易经占卜</h1>
      <p class="subtitle">YIJING FORTUNE</p>
      
      <div class="intro-card">
        <div class="intro-title">📜 先天起卦法</div>
        <div class="intro-text">
          著名国学大师傅佩荣先生推崇此法：以三个随机数（100-999）起卦，取其除以8之余数得上下卦，除以6之余数得动爻。此法完全凭随机数决定，排除人为意念干扰，最能反映天道自然之理。
        </div>
      </div>
      
      <div class="user-bar" id="userBar">
        <button class="user-btn" id="loginBtn" onclick="openLogin()">登录</button>
      </div>
    </header>

    <section class="card">
      <div class="daily-header">
        <div class="daily-title"><span>✦</span> 今日运势</div>
        <button class="daily-btn" onclick="doDaily()">开始占卜</button>
      </div>
      <div class="daily-result" id="dailyResult">
        <div class="daily-gua" id="dailyGuaName">—</div>
        <div class="daily-brief" id="dailyGuaBrief">—</div>
      </div>
    </section>

    <section class="card">
      <div class="section-title">起 卦</div>
      <div class="input-row">
        <div class="input-item">
          <label>数一</label>
          <input type="number" id="num1" min="100" max="999" placeholder="100-999">
        </div>
        <div class="input-item">
          <label>数二</label>
          <input type="number" id="num2" min="100" max="999" placeholder="100-999">
        </div>
        <div class="input-item">
          <label>数三</label>
          <input type="number" id="num3" min="100" max="999" placeholder="100-999">
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="doDivination()">起 卦</button>
        <button class="btn btn-secondary" onclick="doRandom()">随 机</button>
      </div>
    </section>

    <section class="card result" id="result">
      <div class="result-header">
        <div class="gua-name" id="guaName">—</div>
        <div class="gua-symbol" id="guaSymbol">—</div>
      </div>
      
      <div class="section">
        <div class="section-label">☰ 卦辞</div>
        <div class="ancient" id="guaCi">—</div>
      </div>
      
      <div class="section">
        <div class="section-label">⚡ 动爻</div>
        <div class="ancient" id="dongYao">—</div>
      </div>
      
      <div class="section">
        <div class="section-label">☷ 六爻</div>
        <div class="yao-list" id="yaoList"></div>
      </div>
      
      <div class="section" id="interpSection">
        <div class="section-label">📖 解读</div>
        <div id="interpContent"></div>
      </div>
      
      <button class="share-btn" onclick="doShare()">📤 分享卦象</button>
      <div class="btn-row" style="margin-top: 10px;">
        <button class="btn btn-secondary" onclick="doReset()">重新起卦</button>
      </div>
    </section>
  </div>

  <div class="float-btn show" id="historyBtn" onclick="openHistory()">📜</div>

  <div class="modal" id="loginModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="loginTitle">登录</h3>
        <div class="modal-close" onclick="closeModal('loginModal')">×</div>
      </div>
      <div class="modal-body">
        <input type="text" id="username" class="form-input" placeholder="用户名">
        <input type="password" id="password" class="form-input" placeholder="密码">
        <button class="btn btn-primary" onclick="doLogin()" style="width:100%;">登 录</button>
        <p class="link-text" style="margin-top:12px;">
          <span id="linkText">没有账号？</span> <a href="#" onclick="toggleAuth()" id="linkBtn">点击注册</a>
        </p>
      </div>
    </div>
  </div>

  <div class="modal" id="registerModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>注册账号</h3>
        <div class="modal-close" onclick="closeModal('registerModal')">×</div>
      </div>
      <div class="modal-body">
        <input type="text" id="regUser" class="form-input" placeholder="用户名">
        <input type="password" id="regPass" class="form-input" placeholder="密码">
        <input type="password" id="regPass2" class="form-input" placeholder="确认密码">
        <button class="btn btn-primary" onclick="doRegister()" style="width:100%;background:linear-gradient(135deg,#4CAF50,#45a049);">注 册</button>
      </div>
    </div>
  </div>

  <div class="modal" id="historyModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>占卜历史</h3>
        <div class="modal-close" onclick="closeModal('historyModal')">×</div>
      </div>
      <div class="modal-body">
        <div id="historyList"></div>
      </div>
    </div>
  </div>

  <div class="modal" id="historyDetailModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="historyDetailTitle">卦象详情</h3>
        <div class="modal-close" onclick="closeHistoryDetail()">×</div>
      </div>
      <div class="modal-body" id="historyDetailContent"></div>
    </div>
  </div>

  <div class="modal" id="rechargeModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>💎 充值积分</h3>
        <div class="modal-close" onclick="closeModal('rechargeModal')">×</div>
      </div>
      <div class="modal-body">
        <div class="recharge-balance">当前积分：<span id="rechargeBalance">0</span></div>
        <div class="recharge-options">
          <div class="recharge-item" onclick="doRecharge(10, 1)">
            <div class="recharge-amount">10 积分</div>
            <div class="recharge-price">¥1</div>
          </div>
          <div class="recharge-item" onclick="doRecharge(30, 3)">
            <div class="recharge-amount">30 积分</div>
            <div class="recharge-price">¥3</div>
          </div>
          <div class="recharge-item" onclick="doRecharge(100, 9)">
            <div class="recharge-amount">100 积分</div>
            <div class="recharge-price">¥9</div>
          </div>
        </div>
        <div class="recharge-tip">💡 演示版本，点击即可充值成功</div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>

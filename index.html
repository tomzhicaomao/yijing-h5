<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>易经占卜</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* 全新UI设计 */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f0f1a 100%);
      min-height: 100vh;
      color: #fff;
      overflow-x: hidden;
    }
    
    /* 动态背景 */
    .bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }
    
    .bg-canvas .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #fff;
      border-radius: 50%;
      animation: twinkle 3s infinite;
    }
    
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    
    .bg-canvas . Taiji {
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      opacity: 0.05;
      animation: rotate 60s linear infinite;
    }
    
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    /* 主容器 */
    .container {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
    }
    
    /* 顶部Logo */
    .header {
      text-align: center;
      padding: 30px 0 20px;
    }
    
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 15px;
      background: linear-gradient(135deg, #c9a227, #e8c547);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      box-shadow: 0 8px 32px rgba(201, 162, 39, 0.3);
      animation: float 3s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    .title {
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 8px;
      background: linear-gradient(90deg, #c9a227, #e8c547, #c9a227);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .subtitle {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 4px;
      margin-top: 8px;
    }
    
    /* 卡片通用样式 */
    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 24px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.3s ease;
    }
    
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      border-color: rgba(201, 162, 39, 0.3);
    }
    
    /* 今日运势卡片 */
    .daily-card {
      text-align: center;
    }
    
    .daily-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .daily-title {
      font-size: 16px;
      color: rgba(255,255,255,0.7);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .daily-title .icon {
      color: #c9a227;
    }
    
    .daily-btn {
      background: linear-gradient(135deg, #c9a227, #a88420);
      color: #fff;
      border: none;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .daily-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(201, 162, 39, 0.4);
    }
    
    .daily-result {
      padding: 20px;
      background: rgba(201, 162, 39, 0.1);
      border-radius: 16px;
      margin-top: 16px;
    }
    
    .daily-gua {
      font-size: 32px;
      color: #e8c547;
      margin-bottom: 8px;
    }
    
    .daily-brief {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      line-height: 1.6;
    }
    
    /* 起卦区域 */
    .divination-title {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 20px;
      text-align: center;
      letter-spacing: 4px;
    }
    
    .input-group {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    
    .input-item {
      flex: 1;
      text-align: center;
    }
    
    .input-item label {
      display: block;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 8px;
    }
    
    .input-item input {
      width: 100%;
      height: 56px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      color: #fff;
      font-size: 24px;
      text-align: center;
      outline: none;
      transition: all 0.3s;
    }
    
    .input-item input:focus {
      border-color: #c9a227;
      box-shadow: 0 0 20px rgba(201, 162, 39, 0.2);
    }
    
    .input-item input::placeholder {
      color: rgba(255,255,255,0.2);
    }
    
    /* 按钮组 */
    .btn-group {
      display: flex;
      gap: 12px;
    }
    
    .btn {
      flex: 1;
      height: 52px;
      border-radius: 26px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
      border: none;
      letter-spacing: 2px;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #c9a227, #e8c547);
      color: #1a1a2e;
      font-weight: 600;
    }
    
    .btn-primary:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 25px rgba(201, 162, 39, 0.4);
    }
    
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
    }
    
    .btn-secondary:hover {
      background: rgba(255,255,255,0.2);
    }
    
    /* 结果区域 */
    .result-card {
      animation: slideUp 0.5s ease;
    }
    
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .result-header {
      text-align: center;
      margin-bottom: 24px;
    }
    
    .gua-name {
      font-size: 48px;
      color: #e8c547;
      margin-bottom: 16px;
      text-shadow: 0 0 30px rgba(232, 197, 71, 0.5);
    }
    
    .gua-symbol {
      font-size: 36px;
      letter-spacing: 8px;
      color: rgba(255,255,255,0.8);
    }
    
    /* 解读区块 */
    .section {
      margin-bottom: 20px;
      padding: 16px;
      background: rgba(0,0,0,0.2);
      border-radius: 16px;
    }
    
    .section-title {
      font-size: 14px;
      color: #c9a227;
      margin-bottom: 12px;
      letter-spacing: 2px;
    }
    
    .ancient-text {
      font-size: 16px;
      color: rgba(255,255,255,0.9);
      line-height: 1.8;
      margin-bottom: 8px;
    }
    
    .modern-text {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      line-height: 1.6;
    }
    
    /* 爻列表 */
    .yao-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    .yao-item {
      padding: 12px;
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
      border-left: 3px solid rgba(201, 162, 39, 0.5);
    }
    
    .yao-item.active {
      border-left-color: #c9a227;
      background: rgba(201, 162, 39, 0.1);
    }
    
    .yao-position {
      color: #c9a227;
      font-size: 12px;
    }
    
    /* 操作栏 */
    .action-bar {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    
    /* 分享按钮 */
    .share-btn {
      width: 100%;
      height: 48px;
      background: linear-gradient(135deg, #4CAF50, #45a049);
      border: none;
      border-radius: 24px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      margin-top: 16px;
      transition: all 0.3s;
    }
    
    .share-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 25px rgba(76, 175, 80, 0.4);
    }
    
    /* 模态框 - 修复居中 */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(10px);
    }
    
    .modal-content {
      background: #1a1a2e;
      border-radius: 24px;
      width: 100%;
      max-width: 400px;
      max-height: 80vh;
      overflow-y: auto;
      border: 1px solid rgba(201, 162, 39, 0.3);
      animation: modalIn 0.3s ease;
    }
    
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    
    .modal-header h3 {
      font-size: 18px;
      font-weight: 500;
      color: #c9a227;
    }
    
    .modal-close {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      border-radius: 50%;
      transition: all 0.3s;
    }
    
    .modal-close:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
    
    .modal-body {
      padding: 24px;
    }
    
    /* 表单 */
    .form-group {
      margin-bottom: 16px;
    }
    
    .form-input {
      width: 100%;
      height: 48px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 0 16px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: all 0.3s;
    }
    
    .form-input:focus {
      border-color: #c9a227;
    }
    
    .form-input::placeholder {
      color: rgba(255,255,255,0.3);
    }
    
    /* 历史记录 */
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .history-item {
      padding: 16px;
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      border-left: 3px solid transparent;
    }
    
    .history-item:hover {
      background: rgba(201, 162, 39, 0.1);
      border-left-color: #c9a227;
    }
    
    .history-date {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 4px;
    }
    
    .history-gua {
      font-size: 18px;
      color: #e8c547;
    }
    
    /* 用户栏 */
    .user-bar {
      text-align: center;
      margin-top: 16px;
    }
    
    .user-name {
      color: #c9a227;
      margin-right: 12px;
    }
    
    .logout-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.7);
      padding: 6px 16px;
      border-radius: 16px;
      font-size: 12px;
      cursor: pointer;
    }
    
    /* 历史按钮 */
    .history-float-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #c9a227, #e8c547);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 0 8px 25px rgba(201, 162, 39, 0.4);
      cursor: pointer;
      z-index: 100;
      transition: all 0.3s;
    }
    
    .history-float-btn:hover {
      transform: scale(1.1);
    }
    
    /* 隐藏 */
    .hidden { display: none !important; }
    
    /* 响应式 */
    @media (max-width: 480px) {
      .container { padding: 16px; }
      .title { font-size: 24px; }
      .logo { width: 70px; height: 70px; font-size: 32px; }
      .gua-name { font-size: 40px; }
    }
  </style>
</head>
<body>
  <!-- 动态背景 -->
  <div class="bg-canvas" id="bgCanvas"></div>

  <div class="container">
    <!-- 顶部 -->
    <header class="header">
      <div class="logo">☯</div>
      <h1 class="title">易经占卜</h1>
      <p class="subtitle">YIJING FORTUNE</p>
      <div class="user-bar" id="userBar">
        <button class="btn btn-secondary" onclick="showLogin()" style="padding: 8px 24px; height: auto; font-size: 14px;">登录</button>
      </div>
    </header>

    <!-- 今日运势 -->
    <section class="card daily-card">
      <div class="daily-header">
        <div class="daily-title">
          <span class="icon">✦</span>
          <span>今日运势</span>
        </div>
        <button class="daily-btn" onclick="dailyDivination()">开始占卜</button>
      </div>
      <div id="dailyResult" class="daily-result hidden">
        <div class="daily-gua" id="dailyGuaName">—</div>
        <div class="daily-brief" id="dailyGuaBrief">—</div>
      </div>
    </section>

    <!-- 起卦输入 -->
    <section class="card">
      <h2 class="divination-title">起 卦</h2>
      <div class="input-group">
        <div class="input-item">
          <label>数一</label>
          <input type="number" id="num1" min="100" max="999" placeholder="100-999">
        </div>
        <div class="input-item">
          <label>数二</label>
          <input type="number" id="num2" min="100" max="999" placeholder="100-999">
        </div>
        <div class="input-item">
          <label>数三</label>
          <input type="number" id="num3" min="100" max="999" placeholder="100-999">
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="startDivination()">起 卦</button>
        <button class="btn btn-secondary" onclick="randomDivination()">随机</button>
      </div>
    </section>

    <!-- 结果展示 -->
    <section id="result" class="card result-card hidden">
      <div class="result-header">
        <h2 id="guaName" class="gua-name">—</h2>
        <div id="guaImage" class="gua-symbol"></div>
      </div>
      
      <div class="section">
        <div class="section-title">☰ 卦辞</div>
        <div class="ancient-text" id="guaCi">—</div>
        <div class="modern-text" id="guaCiModern"></div>
      </div>
      
      <div class="section">
        <div class="section-title">⚡ 动爻</div>
        <div class="ancient-text" id="dongYao">—</div>
        <div class="modern-text" id="dongYaoModern"></div>
      </div>
      
      <div class="section">
        <div class="section-title">☷ 六爻详解</div>
        <div id="allYaoList" class="yao-list"></div>
      </div>
      
      <div class="section">
        <div class="section-title">📖 解卦分析</div>
        <div id="interpretation"></div>
      </div>
      
      <button class="share-btn" onclick="shareResult()">📤 分享卦象</button>
      
      <div class="btn-group" style="margin-top: 16px;">
        <button class="btn btn-secondary" onclick="reset()">重新起卦</button>
      </div>
    </section>
  </div>

  <!-- 历史记录按钮 -->
  <div class="history-float-btn" onclick="showHistory()" id="historyBtn">📜</div>

  <!-- 登录弹窗 -->
  <div id="loginModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">登录</h3>
        <span class="modal-close" onclick="closeLogin()">×</span>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <input type="text" id="username" class="form-input" placeholder="用户名">
        </div>
        <div class="form-group">
          <input type="password" id="password" class="form-input" placeholder="密码">
        </div>
        <button class="btn btn-primary" onclick="doLogin()" style="width: 100%;">登 录</button>
        <p style="text-align: center; margin-top: 16px; color: rgba(255,255,255,0.5); font-size: 14px;">
          <span id="toggleText">没有账号？</span>
          <a href="#" onclick="toggleRegister(); return false;" style="color: #c9a227;">点击注册</a>
        </p>
      </div>
    </div>
  </div>

  <!-- 注册弹窗 -->
  <div id="registerModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>注册账号</h3>
        <span class="modal-close" onclick="closeRegister()">×</span>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <input type="text" id="regUsername" class="form-input" placeholder="设置用户名">
        </div>
        <div class="form-group">
          <input type="password" id="regPassword" class="form-input" placeholder="设置密码">
        </div>
        <div class="form-group">
          <input type="password" id="regPassword2" class="form-input" placeholder="确认密码">
        </div>
        <button class="btn btn-primary" onclick="doRegister()" style="width: 100%; background: linear-gradient(135deg, #4CAF50, #45a049);">注 册</button>
      </div>
    </div>
  </div>

  <!-- 历史记录弹窗 -->
  <div id="historyModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h3>占卜历史</h3>
        <span class="modal-close" onclick="closeHistory()">×</span>
      </div>
      <div class="modal-body">
        <div id="historyList" class="history-list"></div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    // 生成动态背景
    function createBg() {
      const canvas = document.getElementById('bgCanvas');
      // 星星
      for (let i = 0; i < 50; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 3 + 's';
        canvas.appendChild(star);
      }
    }
    createBg();
  </script>
  
  <script>
    // Supabase 配置
    const SUPABASE_URL = 'https://esmgqpttyqufbqlgxslj.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_r3jfrOsF7Jtw-mjv04iMjw_y3lKKg5P';
    
    let currentUser = null;
    const HISTORY_KEY = 'yijing_history';
    const useSupabase = SUPABASE_URL.startsWith('http');
    
    async function saveToSupabase(table, data) {
      if (!useSupabase) return null;
      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          },
          body: JSON.stringify(data)
        });
        return res.ok;
      } catch (e) { console.error(e); return null; }
    }
    
    async function querySupabase(table, filter) {
      if (!useSupabase) return [];
      try {
        const params = new URLSearchParams(filter);
        const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          }
        });
        return res.ok ? await res.json() : [];
      } catch (e) { console.error(e); return []; }
    }
    
    function initUser() {
      const savedUser = localStorage.getItem('yijing_current_user');
      if (savedUser) {
        currentUser = JSON.parse(savedUser);
        updateUserUI();
      }
    }
    
    function updateUserUI() {
      const userBar = document.getElementById('userBar');
      const historyBtn = document.getElementById('historyBtn');
      if (currentUser) {
        userBar.innerHTML = '<span class="user-name">' + currentUser.username + '</span><button class="logout-btn" onclick="logout()">退出</button>';
        historyBtn.style.display = 'flex';
      } else {
        userBar.innerHTML = '<button class="btn btn-secondary" onclick="showLogin()" style="padding: 8px 24px; height: auto; font-size: 14px;">登录</button>';
        historyBtn.style.display = 'none';
      }
    }
    
    function showLogin() {
      document.getElementById('loginModal').classList.remove('hidden');
    }
    
    function closeLogin() {
      document.getElementById('loginModal').classList.add('hidden');
    }
    
    function closeRegister() {
      document.getElementById('registerModal').classList.add('hidden');
    }
    
    let isRegister = false;
    function toggleRegister() {
      isRegister = !isRegister;
      closeLogin();
      document.getElementById('registerModal').classList.remove('hidden');
    }
    
    function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !password) { alert('请输入用户名和密码'); return; }
      
      querySupabase('users', `username=eq.${username}`).then(users => {
        if (users.length === 0 || users[0].password !== btoa(password)) {
          alert('用户名或密码错误');
          return;
        }
        currentUser = { id: users[0].id, username: username };
        localStorage.setItem('yijing_current_user', JSON.stringify(currentUser));
        updateUserUI();
        closeLogin();
      });
    }
    
    function doRegister() {
      const username = document.getElementById('regUsername').value.trim();
      const password = document.getElementById('regPassword').value;
      const password2 = document.getElementById('regPassword2').value;
      
      if (!username || !password) { alert('请输入用户名和密码'); return; }
      if (password !== password2) { alert('两次密码不一致'); return; }
      if (password.length < 6) { alert('密码至少6位'); return; }
      
      saveToSupabase('users', { username: username, password: btoa(password) }).then(ok => {
        if (ok) {
          alert('注册成功，请登录');
          closeRegister();
          showLogin();
        } else {
          alert('注册失败，用户名可能已存在');
        }
      });
    }
    
    function logout() {
      currentUser = null;
      localStorage.removeItem('yijing_current_user');
      updateUserUI();
    }
    
    // 历史记录
    function saveHistory(hexagram, xiaGua, shangGua, dongYao) {
      const historyItem = {
        id: Date.now(),
        hexagram_id: hexagram.id,
        hexagram_name: hexagram.name,
        hexagram_symbol: hexagramSymbols[hexagram.id] || '☰☷',
        created_at: new Date().toISOString()
      };
      
      let localHistory = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
      localHistory.unshift(historyItem);
      localHistory = localHistory.slice(0, 50);
      localStorage.setItem(HISTORY_KEY, JSON.stringify(localHistory));
      
      if (currentUser) {
        saveToSupabase('history', { 
          user_id: currentUser.id,
          hexagram_id: hexagram.id,
          hexagram_name: hexagram.name,
          hexagram_symbol: hexagramSymbols[hexagram.id] || '☰☷'
        });
      }
    }
    
    function showHistory() {
      const list = document.getElementById('historyList');
      let localHistory = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
      
      if (localHistory.length === 0) {
        list.innerHTML = '<p style="text-align:center;color:rgba(255,255,255,0.5);padding:20px;">暂无占卜记录</p>';
      } else {
        list.innerHTML = localHistory.map(h => '<div class="history-item" onclick="showHistoryDetail(' + h.hexagram_id + ',\'' + h.hexagram_name + '\')"><div class="history-date">' + new Date(h.created_at).toLocaleString('zh-CN') + '</div><div class="history-gua">' + (h.hexagram_symbol || '☰☷') + ' ' + h.hexagram_name + '</div></div>').join('');
      }
      
      document.getElementById('historyModal').classList.remove('hidden');
    }
    
    function showHistoryDetail(hexagramId, hexagramName) {
      let interpText = '';
      if (typeof getHexagramInterpretation === 'function') {
        const info = getHexagramInterpretation(hexagramId, 1);
        interpText = '\n\n【整体运势】' + info.overall + 
                 '\n\n【事业发展】' + info.career + 
                 '\n\n【财运分析】' + info.fortune + 
                 '\n\n【爱情运势】' + info.love + 
                 '\n\n【健康提示】' + info.health;
      }
      
      const symbol = (typeof hexagramSymbols !== 'undefined' && hexagramSymbols[hexagramId]) ? hexagramSymbols[hexagramId] : '☰☷';
      alert(symbol + ' ' + hexagramName + interpText);
    }
    
    function closeHistory() {
      document.getElementById('historyModal').classList.add('hidden');
    }
    
    // 分享
    function shareResult() {
      const guaName = document.getElementById('guaName').textContent;
      const guaCi = document.getElementById('guaCi').textContent;
      const symbol = document.getElementById('guaImage').textContent || '☰☷';
      
      let interpText = '';
      if (typeof getHexagramInterpretation === 'function' && yijingData) {
        const hexagram = yijingData.find(g => g.name === guaName);
        if (hexagram) {
          const info = getHexagramInterpretation(hexagram.id, 1);
          interpText = '\n\n📖 运势：' + info.overall.substring(0, 30) + '...';
        }
      }
      
      const shareText = `🧬 易经占卜\n\n${symbol} ${guaName}\n\n📜 ${guaCi}${interpText}\n\n——来自 易经占卜`;
      
      if (navigator.share) {
        navigator.share({ title: '易经占卜 - ' + guaName, text: shareText }).catch(() => copyToClipboard(shareText));
      } else {
        copyToClipboard(shareText);
      }
    }
    
    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        alert('已复制到剪贴板');
      }).catch(() => alert('复制失败'));
    }
    
    // 回车键提交
    ['num1', 'num2', 'num3'].forEach(id => {
      document.getElementById(id).addEventListener('keypress', (e) => {
        if (e.key === 'Enter') startDivination();
      });
    });
    
    initUser();
  </script>
</body>
</html>

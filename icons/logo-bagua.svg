      <stop offset="0%" stop-color="#2a2020"/>
      <stop offset="70%" stop-color="#191311"/>
      <stop offset="100%" stop-color="#0f0c0b"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
